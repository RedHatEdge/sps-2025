global:
  hostname: oncite
  basedomain: apps.acp.sps2025.com
  observe:
    enable: true
    mode: platform-openshift

virtualfactory:
  enable: true

cxgateway:
  enable: false

kafka:
  storageClass: "lvms-node0-local-storage-immediate"


postgres:
  labels:
    mylabel: "hello"
  size: 64Gi
  backups:
    pgbackrest:
      global:
        repo1-retention-full: '4'
        repo1-retention-full-type: time
        repo1-retention-history: '0'
      manual:
        repoName: repo1
        options:
          - '--type=full'
      repos:
        - name: repo1
          schedules:
            differential: 0 21 * * 1-6
            full: 0 21 * * 0  
          volume:
            volumeClaimSpec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 256Gi

